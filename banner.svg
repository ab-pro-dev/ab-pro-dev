<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 320" width="1200" height="320">
  <defs>
    <!-- Background gradient -->
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#05060f"/>
      <stop offset="50%" stop-color="#0a0e26"/>
      <stop offset="100%" stop-color="#12082b"/>
    </linearGradient>

    <!-- Name gradient -->
    <linearGradient id="nameGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="50%" stop-color="#a8d8ea"/>
      <stop offset="100%" stop-color="#58A6FF"/>
    </linearGradient>

    <!-- Planet halo gradient -->
    <radialGradient id="haloGrad" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#22d3ee" stop-opacity="0.5"/>
      <stop offset="100%" stop-color="#22d3ee" stop-opacity="0"/>
    </radialGradient>

    <!-- Scanline sweep gradient (vertical, for the moving band) -->
    <linearGradient id="sweepGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0"/>
      <stop offset="40%" stop-color="#ffffff" stop-opacity="0"/>
      <stop offset="50%" stop-color="#ffffff" stop-opacity="0.07"/>
      <stop offset="60%" stop-color="#ffffff" stop-opacity="0"/>
      <stop offset="100%" stop-color="#ffffff" stop-opacity="0"/>
    </linearGradient>

    <!-- Glow filter for planet -->
    <filter id="glowCyan" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="8" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <!-- Soft blur for bokeh orbs -->
    <filter id="softBlur" x="-100%" y="-100%" width="300%" height="300%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="40"/>
    </filter>

    <!-- Medium blur for orb cores -->
    <filter id="medBlur" x="-100%" y="-100%" width="300%" height="300%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="20"/>
    </filter>

    <!-- Name glow filter -->
    <filter id="nameGlow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="4" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <!-- Text glow for circuit nodes -->
    <filter id="nodeGlow" x="-100%" y="-100%" width="300%" height="300%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="3" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <!-- Line glow filter -->
    <filter id="lineGlow" x="-20%" y="-50%" width="140%" height="200%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="1.5" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <!-- Divider line glow -->
    <filter id="dividerGlow" x="-20%" y="-200%" width="140%" height="500%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="2" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <!-- Vignette gradient -->
    <radialGradient id="vignetteGrad" cx="50%" cy="50%" r="70%">
      <stop offset="0%" stop-color="#000000" stop-opacity="0"/>
      <stop offset="60%" stop-color="#000000" stop-opacity="0"/>
      <stop offset="100%" stop-color="#000000" stop-opacity="0.5"/>
    </radialGradient>

    <!-- Scanline pattern -->
    <pattern id="scanlines" patternUnits="userSpaceOnUse" width="4" height="4">
      <line x1="0" y1="0" x2="4" y2="0" stroke="#ffffff" stroke-width="0.5" stroke-opacity="0.03"/>
    </pattern>
  </defs>

  <!-- Background -->
  <rect width="1200" height="320" fill="url(#bgGrad)"/>

  <!-- Twinkling stars (18 dots scattered across the background) -->
  <g>
    <circle cx="120" cy="45" r="1.2" fill="#22d3ee" opacity="0.3">
      <animate attributeName="opacity" values="0.1;0.9;0.1" dur="3.1s" begin="-0.5s" repeatCount="indefinite"/>
    </circle>
    <circle cx="310" cy="28" r="1" fill="#ffffff" opacity="0.2">
      <animate attributeName="opacity" values="0.1;0.85;0.1" dur="4.2s" begin="-1.8s" repeatCount="indefinite"/>
    </circle>
    <circle cx="520" cy="55" r="1.3" fill="#22d3ee" opacity="0.25">
      <animate attributeName="opacity" values="0.1;0.9;0.1" dur="2.7s" begin="-0.2s" repeatCount="indefinite"/>
    </circle>
    <circle cx="680" cy="35" r="1" fill="#ffffff" opacity="0.3">
      <animate attributeName="opacity" values="0.15;0.8;0.15" dur="3.8s" begin="-2.5s" repeatCount="indefinite"/>
    </circle>
    <circle cx="870" cy="60" r="1.1" fill="#22d3ee" opacity="0.2">
      <animate attributeName="opacity" values="0.1;0.9;0.1" dur="4.5s" begin="-1.0s" repeatCount="indefinite"/>
    </circle>
    <circle cx="1050" cy="42" r="1.2" fill="#ffffff" opacity="0.35">
      <animate attributeName="opacity" values="0.1;0.85;0.1" dur="3.3s" begin="-3.0s" repeatCount="indefinite"/>
    </circle>
    <circle cx="1150" cy="75" r="1" fill="#22d3ee" opacity="0.2">
      <animate attributeName="opacity" values="0.1;0.9;0.1" dur="2.9s" begin="-0.8s" repeatCount="indefinite"/>
    </circle>
    <circle cx="200" cy="180" r="1.1" fill="#ffffff" opacity="0.25">
      <animate attributeName="opacity" values="0.1;0.8;0.1" dur="4.8s" begin="-2.0s" repeatCount="indefinite"/>
    </circle>
    <circle cx="440" cy="210" r="1" fill="#22d3ee" opacity="0.3">
      <animate attributeName="opacity" values="0.15;0.9;0.15" dur="3.5s" begin="-1.3s" repeatCount="indefinite"/>
    </circle>
    <circle cx="600" cy="175" r="1.2" fill="#ffffff" opacity="0.2">
      <animate attributeName="opacity" values="0.1;0.85;0.1" dur="2.5s" begin="-3.5s" repeatCount="indefinite"/>
    </circle>
    <circle cx="760" cy="195" r="1" fill="#22d3ee" opacity="0.3">
      <animate attributeName="opacity" values="0.1;0.9;0.1" dur="4.0s" begin="-0.6s" repeatCount="indefinite"/>
    </circle>
    <circle cx="950" cy="230" r="1.3" fill="#ffffff" opacity="0.2">
      <animate attributeName="opacity" values="0.1;0.8;0.1" dur="3.7s" begin="-2.8s" repeatCount="indefinite"/>
    </circle>
    <circle cx="1100" cy="160" r="1.1" fill="#22d3ee" opacity="0.25">
      <animate attributeName="opacity" values="0.1;0.9;0.1" dur="4.3s" begin="-1.5s" repeatCount="indefinite"/>
    </circle>
    <circle cx="80" cy="290" r="1" fill="#ffffff" opacity="0.3">
      <animate attributeName="opacity" values="0.15;0.85;0.15" dur="3.0s" begin="-0.3s" repeatCount="indefinite"/>
    </circle>
    <circle cx="350" cy="295" r="1.2" fill="#22d3ee" opacity="0.2">
      <animate attributeName="opacity" values="0.1;0.9;0.1" dur="4.6s" begin="-2.2s" repeatCount="indefinite"/>
    </circle>
    <circle cx="580" cy="285" r="1" fill="#ffffff" opacity="0.25">
      <animate attributeName="opacity" values="0.1;0.8;0.1" dur="2.8s" begin="-3.8s" repeatCount="indefinite"/>
    </circle>
    <circle cx="820" cy="275" r="1.1" fill="#22d3ee" opacity="0.3">
      <animate attributeName="opacity" values="0.15;0.9;0.15" dur="3.4s" begin="-1.1s" repeatCount="indefinite"/>
    </circle>
    <circle cx="1020" cy="290" r="1" fill="#ffffff" opacity="0.2">
      <animate attributeName="opacity" values="0.1;0.85;0.1" dur="4.1s" begin="-2.7s" repeatCount="indefinite"/>
    </circle>
  </g>

  <!-- Perspective grid (faint, skewed, bottom fade) -->
  <g opacity="0.12" transform="skewX(-15)">
    <line x1="200" y1="320" x2="200" y2="200" stroke="#58A6FF" stroke-width="0.5" opacity="0.5"/>
    <line x1="280" y1="320" x2="280" y2="210" stroke="#58A6FF" stroke-width="0.5" opacity="0.45"/>
    <line x1="360" y1="320" x2="360" y2="220" stroke="#58A6FF" stroke-width="0.5" opacity="0.4"/>
    <line x1="440" y1="320" x2="440" y2="230" stroke="#58A6FF" stroke-width="0.5" opacity="0.35"/>
    <line x1="520" y1="320" x2="520" y2="240" stroke="#58A6FF" stroke-width="0.5" opacity="0.3"/>
    <line x1="600" y1="320" x2="600" y2="250" stroke="#58A6FF" stroke-width="0.5" opacity="0.25"/>
    <line x1="680" y1="320" x2="680" y2="260" stroke="#58A6FF" stroke-width="0.5" opacity="0.2"/>
    <line x1="760" y1="320" x2="760" y2="270" stroke="#58A6FF" stroke-width="0.5" opacity="0.15"/>
    <line x1="840" y1="320" x2="840" y2="280" stroke="#58A6FF" stroke-width="0.5" opacity="0.1"/>
    <line x1="920" y1="320" x2="920" y2="290" stroke="#58A6FF" stroke-width="0.5" opacity="0.05"/>
    <line x1="1000" y1="320" x2="1000" y2="295" stroke="#58A6FF" stroke-width="0.5" opacity="0.03"/>
    <line x1="100" y1="320" x2="1100" y2="320" stroke="#58A6FF" stroke-width="0.5" opacity="0.2"/>
    <line x1="150" y1="290" x2="1050" y2="290" stroke="#58A6FF" stroke-width="0.5" opacity="0.12"/>
    <line x1="200" y1="260" x2="1000" y2="260" stroke="#58A6FF" stroke-width="0.5" opacity="0.07"/>
    <line x1="250" y1="230" x2="950" y2="230" stroke="#58A6FF" stroke-width="0.5" opacity="0.04"/>
  </g>

  <!-- Bokeh orbs with breathing animation -->
  <!-- Bottom-left magenta orb -->
  <circle cx="80" cy="280" r="90" fill="#e11d73" opacity="0.12" filter="url(#softBlur)">
    <animate attributeName="r" values="90;100;90" dur="5s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0.12;0.18;0.12" dur="5s" repeatCount="indefinite"/>
  </circle>
  <!-- Top-left violet orb -->
  <circle cx="150" cy="40" r="70" fill="#8b5cf6" opacity="0.1" filter="url(#softBlur)">
    <animate attributeName="r" values="70;78;70" dur="4.5s" begin="-1.2s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0.1;0.16;0.1" dur="4.5s" begin="-1.2s" repeatCount="indefinite"/>
  </circle>
  <!-- Bottom-right magenta orb -->
  <circle cx="1050" cy="300" r="100" fill="#d946ef" opacity="0.1" filter="url(#softBlur)">
    <animate attributeName="r" values="100;112;100" dur="5.5s" begin="-2.5s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0.1;0.17;0.1" dur="5.5s" begin="-2.5s" repeatCount="indefinite"/>
  </circle>
  <!-- Mid-left cyan orb -->
  <circle cx="50" cy="160" r="60" fill="#22d3ee" opacity="0.08" filter="url(#softBlur)">
    <animate attributeName="r" values="60;67;60" dur="4.8s" begin="-0.8s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0.08;0.14;0.08" dur="4.8s" begin="-0.8s" repeatCount="indefinite"/>
  </circle>

  <!-- Planet halo with breathing animation -->
  <circle cx="920" cy="90" r="120" fill="url(#haloGrad)" filter="url(#medBlur)" opacity="0.6">
    <animate attributeName="r" values="120;132;120" dur="6s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0.6;0.75;0.6" dur="6s" repeatCount="indefinite"/>
  </circle>

  <!-- Planet ring (tilted ellipse) -->
  <ellipse cx="920" cy="90" rx="65" ry="18" fill="none" stroke="#a855f7" stroke-width="2" opacity="0.5" transform="rotate(-25 920 90)" filter="url(#lineGlow)"/>

  <!-- Planet core -->
  <circle cx="920" cy="90" r="18" fill="#ffffff" filter="url(#glowCyan)"/>
  <circle cx="920" cy="90" r="10" fill="#22d3ee" opacity="0.9"/>

  <!-- Circuit traces with energy pulse animation -->
  <g filter="url(#lineGlow)">
    <!-- Cyan trace 1 -->
    <polyline points="750,30 750,80 800,80 800,120 850,120" fill="none" stroke="#22d3ee" stroke-width="1.2" stroke-linejoin="round" stroke-linecap="round" opacity="0.6" stroke-dasharray="8 120" stroke-dashoffset="0">
      <animate attributeName="stroke-dashoffset" from="0" to="-128" dur="3s" repeatCount="indefinite"/>
    </polyline>
    <circle cx="750" cy="30" r="2.5" fill="#22d3ee" opacity="0.8" filter="url(#nodeGlow)"/>
    <circle cx="850" cy="120" r="2.5" fill="#22d3ee" opacity="0.8" filter="url(#nodeGlow)"/>

    <!-- Magenta trace 1 -->
    <polyline points="700,280 700,240 660,240 660,200 620,200" fill="none" stroke="#d946ef" stroke-width="1.2" stroke-linejoin="round" stroke-linecap="round" opacity="0.5" stroke-dasharray="8 140" stroke-dashoffset="0">
      <animate attributeName="stroke-dashoffset" from="0" to="-148" dur="3.6s" repeatCount="indefinite"/>
    </polyline>
    <circle cx="700" cy="280" r="2.5" fill="#d946ef" opacity="0.7" filter="url(#nodeGlow)"/>
    <circle cx="620" cy="200" r="2.5" fill="#d946ef" opacity="0.7" filter="url(#nodeGlow)"/>

    <!-- Cyan trace 2 -->
    <polyline points="1050,50 1000,50 1000,100 960,100 960,150" fill="none" stroke="#22d3ee" stroke-width="1" stroke-linejoin="round" stroke-linecap="round" opacity="0.4" stroke-dasharray="6 110" stroke-dashoffset="0">
      <animate attributeName="stroke-dashoffset" from="0" to="-116" dur="4s" begin="-0.5s" repeatCount="indefinite"/>
    </polyline>
    <circle cx="1050" cy="50" r="2" fill="#22d3ee" opacity="0.6" filter="url(#nodeGlow)"/>
    <circle cx="960" cy="150" r="2" fill="#22d3ee" opacity="0.6" filter="url(#nodeGlow)"/>

    <!-- Magenta trace 2 -->
    <polyline points="1100,200 1060,200 1060,160 1020,160 1020,130" fill="none" stroke="#d946ef" stroke-width="1" stroke-linejoin="round" stroke-linecap="round" opacity="0.35" stroke-dasharray="6 100" stroke-dashoffset="0">
      <animate attributeName="stroke-dashoffset" from="0" to="-106" dur="3.3s" begin="-1.5s" repeatCount="indefinite"/>
    </polyline>
    <circle cx="1100" cy="200" r="2" fill="#d946ef" opacity="0.5" filter="url(#nodeGlow)"/>
    <circle cx="1020" cy="130" r="2" fill="#d946ef" opacity="0.5" filter="url(#nodeGlow)"/>
  </g>

  <!-- Scanlines overlay -->
  <rect width="1200" height="320" fill="url(#scanlines)"/>

  <!-- Subtle scanline sweep (drifts top to bottom, loops) -->
  <rect x="0" y="-320" width="1200" height="320" fill="url(#sweepGrad)" opacity="0.6">
    <animateTransform attributeName="transform" type="translate" from="0 -320" to="0 640" dur="8s" repeatCount="indefinite"/>
  </rect>

  <!-- Vignette overlay -->
  <rect width="1200" height="320" fill="url(#vignetteGrad)"/>

  <!-- TEXT CONTENT -->
  <g transform="translate(60, 60)">
    <!-- Eyebrow line -->
    <text x="0" y="0" font-family="'Courier New', monospace" font-size="13" fill="#22d3ee" letter-spacing="4" opacity="0.9">// FULL-STACK DEVELOPER</text>

    <!-- Name with glow -->
    <g filter="url(#nameGlow)">
      <text x="0" y="60" font-family="Arial, Helvetica, sans-serif" font-size="52" font-weight="bold" fill="url(#nameGrad)" letter-spacing="6">ABERA HAGAZI</text>
    </g>

    <!-- Divider line -->
    <line x1="0" y1="78" x2="340" y2="78" stroke="#22d3ee" stroke-width="1.5" filter="url(#dividerGlow)" opacity="0.7"/>

    <!-- Tagline -->
    <text x="0" y="110" font-family="'Courier New', monospace" font-size="14" fill="#8899aa" letter-spacing="0.5">Building fast, secure &amp; scalable E-Commerce platforms</text>

    <!-- Tech tags -->
    <g transform="translate(0, 145)">
      <!-- REACT -->
      <rect x="0" y="0" width="88" height="28" rx="4" fill="none" stroke="#22d3ee" stroke-width="1" opacity="0.7"/>
      <text x="44" y="19" font-family="'Courier New', monospace" font-size="12" fill="#22d3ee" text-anchor="middle" letter-spacing="1">REACT</text>

      <!-- NODE.JS -->
      <rect x="102" y="0" width="102" height="28" rx="4" fill="none" stroke="#8b5cf6" stroke-width="1" opacity="0.7"/>
      <text x="153" y="19" font-family="'Courier New', monospace" font-size="12" fill="#8b5cf6" text-anchor="middle" letter-spacing="1">NODE.JS</text>

      <!-- NEXT.JS -->
      <rect x="218" y="0" width="100" height="28" rx="4" fill="none" stroke="#d946ef" stroke-width="1" opacity="0.7"/>
      <text x="268" y="19" font-family="'Courier New', monospace" font-size="12" fill="#d946ef" text-anchor="middle" letter-spacing="1">NEXT.JS</text>

      <!-- EXPRESS -->
      <rect x="332" y="0" width="102" height="28" rx="4" fill="none" stroke="#22d3ee" stroke-width="1" opacity="0.7"/>
      <text x="383" y="19" font-family="'Courier New', monospace" font-size="12" fill="#22d3ee" text-anchor="middle" letter-spacing="1">EXPRESS</text>
    </g>
  </g>
</svg>