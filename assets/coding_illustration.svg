<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400" width="400" height="400">
  <!-- Background -->
  <rect width="400" height="400" fill="#0D1117" rx="20"/>
  
  <!-- Desk -->
  <rect x="60" y="280" width="280" height="15" fill="#1E293B" rx="4"/>
  <rect x="80" y="295" width="20" height="60" fill="#1E293B"/>
  <rect x="300" y="295" width="20" height="60" fill="#1E293B"/>
  
  <!-- Laptop Screen -->
  <rect x="130" y="180" width="140" height="100" fill="#161B22" rx="8"/>
  <rect x="138" y="188" width="124" height="76" fill="#0D1117" rx="4"/>
  
  <!-- Laptop Base -->
  <rect x="110" y="280" width="180" height="12" fill="#30363D" rx="3"/>
  
  <!-- Code on Screen -->
  <text x="148" y="210" font-family="monospace" font-size="10" fill="#7EE787">&lt;div&gt;</text>
  <text x="158" y="222" font-family="monospace" font-size="10" fill="#58A6FF">const app = () =&gt;</text>
  <text x="148" y="234" font-family="monospace" font-size="10" fill="#FF7B72">return</text>
  <text x="180" y="234" font-family="monospace" font-size="10" fill="#C9D1D9">{ code }</text>
  
  <!-- Blinking Cursor -->
  <rect x="220" y="226" width="7" height="12" fill="#58A6FF">
    <animate attributeName="opacity" values="1;0;1" dur="1s" repeatCount="indefinite"/>
  </rect>
  
  <!-- Character Body -->
  <circle cx="200" cy="150" r="35" fill="#F0C27A"/> <!-- Head -->
  <rect x="165" y="185" width="70" height="80" fill="#58A6FF" rx="8"/> <!-- Shirt -->
  
  <!-- Arms -->
  <rect x="140" y="200" width="30" height="15" fill="#F0C27A" rx="5"/>
  <rect x="230" y="200" width="30" height="15" fill="#F0C27A" rx="5"/>
  
  <!-- Hair -->
  <path d="M165 140 Q165 115 200 115 Q235 115 235 140" fill="#1E293B"/>
  
  <!-- Eyes -->
  <circle cx="185" cy="145" r="4" fill="#0D1117"/>
  <circle cx="215" cy="145" r="4" fill="#0D1117"/>
  
  <!-- Thought Bubble -->
  <circle cx="280" cy="80" r="40" fill="#1E293B" stroke="#58A6FF" stroke-width="2" opacity="0.8">
    <animate attributeName="opacity" values="0.6;0.9;0.6" dur="3s" repeatCount="indefinite"/>
  </circle>
  <circle cx="250" cy="110" r="12" fill="#1E293B" opacity="0.7"/>
  <circle cx="238" cy="128" r="6" fill="#1E293B" opacity="0.5"/>
  
  <!-- Thought Bubble Content: Code Brackets -->
  <text x="268" y="75" font-family="monospace" font-size="14" fill="#FF7B72" opacity="0.8">{</text>
  <text x="286" y="75" font-family="monospace" font-size="14" fill="#7EE787" opacity="0.8">}</text>
  
  <!-- Floating Code Symbols -->
  <text x="260" y="95" font-family="monospace" font-size="12" fill="#58A6FF" opacity="0.7">
    &lt;/&gt;
    <animate attributeName="y" values="95;65;95" dur="4s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0.7;0.2;0.7" dur="4s" repeatCount="indefinite"/>
  </text>
  
  <text x="290" y="85" font-family="monospace" font-size="10" fill="#C9D1D9" opacity="0.6">
    ();
    <animate attributeName="y" values="85;55;85" dur="5s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0.6;0.1;0.6" dur="5s" repeatCount="indefinite"/>
  </text>
  
  <text x="255" y="65" font-family="monospace" font-size="11" fill="#FF7B72" opacity="0.5">
    []
    <animate attributeName="y" values="65;35;65" dur="4.5s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0.5;0.1;0.5" dur="4.5s" repeatCount="indefinite"/>
  </text>
  
  <!-- Subtle Head Tilt Animation -->
  <animateTransform attributeName="transform" type="rotate" values="0 200 150;-2 200 150;0 200 150;2 200 150;0 200 150" dur="6s" repeatCount="indefinite"/>
</svg>